<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="向晴简历：理解你的经历，根据岗位 JD 优化出更有说服力的简历。" />
    <title>向晴简历｜让你的经历被好好看见</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=20260702-email-auth-2" />
  </head>
  <body>
    <div class="nature-bg" aria-hidden="true">
      <div class="meadow-photo"></div>
      <div class="meadow-wind meadow-wind-back"></div>
      <div class="meadow-wind meadow-wind-front"></div>
      <div class="floating-seeds"><i></i><i></i><i></i><i></i><i></i><i></i></div>
    </div>
    <div class="noise" aria-hidden="true"></div>
    <header class="topbar">
      <button class="brand" type="button" data-action="home" aria-label="返回首页">
        <span class="brand-mark">晴</span>
        <span>向晴简历</span>
      </button>
      <div class="topbar-right">
        <span class="save-state"><i></i> 内容已自动保存</span>
        <span class="quota-pill" id="quotaPill">登录后每天享 3 次免费下载</span>
        <button class="account-button" id="accountButton" type="button" data-action="account">登录 / 注册</button>
        <button class="ghost-button" type="button" data-action="help">使用帮助</button>
      </div>
    </header>

    <main id="app" aria-live="polite"></main>

    <div id="toast" class="toast" role="status"></div>

    <div id="helpDialog" class="modal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
        <button class="modal-close" type="button" data-action="close-help" aria-label="关闭">×</button>
        <span class="eyebrow">放心交给我们</span>
        <h2 id="helpTitle">你只需要准备两样东西</h2>
        <div class="help-grid">
          <div><b>01</b><p>你现有的简历，Word、PDF 或 TXT 都可以。</p></div>
          <div><b>02</b><p>本次即将投递公司的具体岗位 JD；每次更换公司或岗位都要重新填写。</p></div>
        </div>
        <p class="privacy-note">🔒 你的资料只用于本次简历优化，不会公开展示。</p>
      </div>
    </div>

    <script src="./vendor/pdf.min.js"></script>
    <script src="./vendor/mammoth.browser.min.js"></script>
    <script src="./firebase-config.js?v=20260702-email-auth-2"></script>
    <script src="./firebase-auth.js?v=20260702-email-auth-2"></script>
    <script src="./app.js?v=20260702-email-auth-2"></script>
  </body>
</html>
